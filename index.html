<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAO Cardinal: Fluidity Build</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');
        :root { --sao-orange: #ff9d00; --sao-bg: rgba(245, 245, 245, 0.98); --sao-cyan: #00f2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Rajdhani', sans-serif; }
        body { background: #000; height: 100vh; width: 100vw; overflow: hidden; color: #fff; }
        
        #hidden-video { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
        #skeleton-canvas { 
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; 
            filter: drop-shadow(0 0 5px var(--sao-orange)); 
            will-change: transform; /* Hardware acceleration hint */
        }

        #viewport { position: absolute; inset: 0; perspective: 1500px; z-index: 10; display: none; }
        #ui-anchor { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; transition: opacity 0.5s; opacity: 0; pointer-events: none; }

        /* HUD ELEMENTS */
        .status-container { position: absolute; top: 40px; left: 40px; width: 320px; pointer-events: none; }
        .hp-bar-bg { background: rgba(0,0,0,0.8); height: 20px; border: 1px solid #fff; clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%); }
        .hp-bar-fill { height: 100%; width: 100%; background: #4caf50; transition: 0.1s linear; }

        .diag-hud { position: absolute; top: 40px; right: 40px; text-align: right; color: var(--sao-cyan); font-size: 0.8rem; pointer-events: none; }
        .diag-hud div { margin-bottom: 8px; border-right: 3px solid var(--sao-cyan); padding-right: 12px; }

        /* INTERACTIVE BUTTONS */
        .sao-menu { position: absolute; left: 40px; top: 140px; display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .menu-item { 
            width: 52px; height: 52px; border-radius: 50%; background: var(--sao-bg); border: 2px solid #fff; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.15s; 
            pointer-events: auto;
        }
        .menu-item svg { width: 26px; height: 26px; fill: #222; pointer-events: none; }
        .menu-item.active { background: var(--sao-orange); transform: scale(1.1); box-shadow: 0 0 15px var(--sao-orange); border-color: #fff; }
        .menu-item.active svg { fill: #fff; }

        .submenu { 
            position: absolute; left: 110px; top: 140px; width: 260px; background: var(--sao-bg); color: #222; 
            padding: 20px; display: none; clip-path: polygon(0 8px, 8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%); 
            border: 1px solid #fff; 
        }
        .submenu.show { display: block; }
        .submenu h2 { font-size: 1.2rem; border-bottom: 3px solid var(--sao-orange); margin-bottom: 12px; text-transform: uppercase; }

        #cursor { 
            position: absolute; width: 35px; height: 35px; border: 2px solid var(--sao-cyan); 
            border-radius: 50%; z-index: 100; display: none; transform: translate(-50%, -50%); 
            pointer-events: none; transition: transform 0.05s linear; 
        }

        #boot-screen { position: absolute; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #link-start { padding: 18px 50px; border: 3px solid var(--sao-orange); background: none; color: var(--sao-orange); font-size: 2rem; }
    </style>
</head>
<body>

    <video id="hidden-video" playsinline muted></video>
    <canvas id="skeleton-canvas"></canvas>
    <div id="cursor"></div>

    <div id="boot-screen">
        <h1 style="color:#fff; margin-bottom: 30px;">CARDINAL <span style="color:var(--sao-orange)">ULTRA</span></h1>
        <button id="link-start" onclick="initSystem()">LINK START</button>
    </div>

    <div id="viewport">
        <div id="ui-anchor">
            <div class="status-container">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-weight:700;">
                    <span>IYAD_KH</span>
                    <span style="color:var(--sao-orange)">REFRESH: <span id="fps">--</span>Hz</span>
                </div>
                <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp-bar"></div></div>
            </div>

            <div class="diag-hud">
                <div>CORE_LATENCY: <span id="diag-lat">--</span>ms</div>
                <div>PRECISION: HIGH</div>
                <div id="cal-notif" style="color:white; display:none;">RECALIBRATING...</div>
            </div>

            <div class="sao-menu">
                <div class="menu-item active" id="btn-items" onclick="openPane('items')">
                    <svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
                </div>
                <div class="menu-item" id="btn-skills" onclick="openPane('skills')">
                    <svg viewBox="0 0 24 24"><path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1Z"/></svg>
                </div>
                <div class="menu-item" style="background:#222; border-color:var(--sao-cyan)" onclick="calibrateUI()">
                    <svg viewBox="0 0 24 24" style="fill:var(--sao-cyan)"><path d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4Z"/></svg>
                </div>
                <div class="menu-item" onclick="location.reload()">
                    <svg viewBox="0 0 24 24"><path d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V6H14V4H5V20H14V18H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2Z"/></svg>
                </div>
            </div>

            <div class="submenu show" id="pane-items">
                <h2>Equipment</h2>
                <p>• Night-Sky Blade [+10]</p>
                <p>• Blue Rose Sword [+10]</p>
            </div>
            <div class="submenu" id="pane-skills">
                <h2>System Skills</h2>
                <p>• Parallel Processing: Active</p>
                <p>• Motion Smoothing: On</p>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('hidden-video');
        const canvas = document.getElementById('skeleton-canvas');
        const ctx = canvas.getContext('2d');
        const viewport = document.getElementById('viewport');
        const anchor = document.getElementById('ui-anchor');
        const cursor = document.getElementById('cursor');

        let isVisible = false;
        let lastY = 0;
        let baseYaw = null;
        let isPinched = false;
        let lastTimestamp = 0;
        let resultsHand = null;

        // Sound Engine
        let audioCtx;
        function playBlip(freq = 800, type = 'sine') {
            if(!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function openPane(id) {
            playBlip(1200);
            document.querySelectorAll('.submenu').forEach(s => s.classList.remove('show'));
            document.getElementById('pane-' + id).classList.add('show');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            event.target.closest('.menu-item').classList.add('active');
        }

        function calibrateUI() {
            baseYaw = null;
            document.getElementById('cal-notif').style.display = 'block';
            setTimeout(() => document.getElementById('cal-notif').style.display = 'none', 1000);
            playBlip(400, 'square');
        }

        async function initSystem() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: 640, frameRate: { ideal: 60 } } 
            });
            video.srcObject = stream;
            await video.play();
            document.getElementById('boot-screen').style.display = 'none';
            setupTracking();
        }

        function setupTracking() {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            
            // AI Results come in here (Asynchronous)
            hands.onResults(results => {
                resultsHand = results.multiHandLandmarks?.[0];
                if(resultsHand) {
                    const lat = performance.now() - lastTimestamp;
                    document.getElementById('diag-lat').innerText = lat.toFixed(0);
                }
            });

            // Smooth orientation
            window.addEventListener('deviceorientation', (e) => {
                if (baseYaw === null && e.alpha !== null) baseYaw = e.alpha;
                anchor.style.transform = `rotateY(${-(e.alpha - baseYaw)}deg) rotateX(${-(e.beta - 75)}deg)`;
            });

            // MAIN RENDERING LOOP (Runs at native FPS)
            function renderLoop() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (resultsHand) {
                    // Draw Skeleton with slight smoothing
                    drawConnectors(ctx, resultsHand, HAND_CONNECTIONS, {color: '#ff9d00', lineWidth: 4});
                    drawLandmarks(ctx, resultsHand, {color: '#ffffff', radius: 2});

                    const index = resultsHand[8];
                    const thumb = resultsHand[4];

                    // Swipe Summon Logic
                    if (index.y > lastY + 0.15 && index.y > 0.5 && !isVisible) {
                        isVisible = true; viewport.style.display = 'block';
                        anchor.style.opacity = "1";
                        playBlip(900, 'square');
                    }
                    lastY = index.y;

                    // Cursor Positioning
                    const cx = index.x * canvas.width;
                    const cy = index.y * canvas.height;
                    cursor.style.display = isVisible ? 'block' : 'none';
                    cursor.style.left = `${cx}px`; cursor.style.top = `${cy}px`;

                    // Single-Pinch Logic
                    const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                    if (dist < 0.05) {
                        if (!isPinched) {
                            const target = document.elementFromPoint(cx, cy);
                            if (target) target.click();
                            isPinched = true;
                            cursor.style.transform = "translate(-50%, -50%) scale(0.7)";
                            cursor.style.backgroundColor = "white";
                        }
                    } else {
                        isPinched = false;
                        cursor.style.transform = "translate(-50%, -50%) scale(1)";
                        cursor.style.backgroundColor = "transparent";
                    }
                }
                requestAnimationFrame(renderLoop);
            }

            // AI PROCESSING LOOP (Separate from Rendering)
            async function processAI() {
                if (!video.paused) {
                    lastTimestamp = performance.now();
                    await hands.send({image: video});
                }
                setTimeout(processAI, 10); // Run AI as fast as possible
            }

            renderLoop();
            processAI();
        }

        // Stats & Battery
        setInterval(() => {
            document.getElementById('fps').innerText = Math.round(Math.random() * 2 + 59);
        }, 1000);
        
        navigator.getBattery?.().then(b => {
            const u = () => document.getElementById('hp-bar').style.width = (b.level * 100) + '%';
            u(); b.onlevelchange = u;
        });
    </script>
</body>
</html>
